<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영화 티어표 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#161616;--border:rgba(255,255,255,0.07);
  --text:#f0f0f0;--muted:rgba(255,255,255,0.35);
  --s:#FFD700;--aplus:#FF8C42;--a:#7EB8FF;--b:#5DDBA4;--c:#B8A0FF;--d:#FF6B6B;--e:#666680;
}
body{background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans KR',sans-serif;min-height:100vh}

/* HEADER */
.header{padding:56px 48px 40px;max-width:1100px;margin:0 auto;position:relative}
.header-year{font-size:clamp(64px,10vw,120px);font-weight:900;letter-spacing:-4px;line-height:1;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.1);user-select:none;pointer-events:none;position:absolute;right:40px;top:40px;z-index:0}
.header-content{position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
.header-left h1{font-size:clamp(36px,5vw,60px);font-weight:900;letter-spacing:-2px;line-height:1;color:#fff}
.header-left h1 span{color:var(--s)}
.header-left p{margin-top:10px;font-size:13px;color:var(--muted);font-weight:300;letter-spacing:.3px}
.header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.header-meta-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.2);font-weight:500}
.header-meta-title{font-size:15px;font-weight:700;letter-spacing:-.3px;color:rgba(255,255,255,.55);border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:6px}

/* TABS */
.tabs-nav-wrap{max-width:1100px;margin:0 auto;padding:0 48px;border-bottom:1px solid var(--border);margin-bottom:32px}
.tabs-nav{display:flex;gap:4px;margin-bottom:-1px}
.tab-btn{padding:12px 22px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.3px;font-family:'Noto Sans KR',sans-serif;transition:color .15s,border-color .15s}
.tab-btn:hover{color:rgba(255,255,255,.7)}
.tab-btn.active{color:#fff;border-bottom-color:var(--s)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* TIER TAB */
.container{max-width:1100px;margin:0 auto;padding:0 48px 80px;display:flex;flex-direction:column;gap:3px}
.tier-row{display:grid;grid-template-columns:88px 1fr;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;position:relative}
.tier-row:hover{border-color:rgba(255,255,255,.12)}
.tier-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tier-color);opacity:.8}
.grade-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 12px;border-right:1px solid var(--border);gap:4px}
.grade-label{font-family:'Inter',sans-serif;font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--tier-color);line-height:1}
.grade-dot{width:5px;height:5px;border-radius:50%;background:var(--tier-color);opacity:.5}
.content-cell{padding:20px 24px;display:flex;flex-direction:column;justify-content:center;gap:12px}
.tier-desc{font-size:12px;color:var(--muted);font-weight:400;letter-spacing:.2px;line-height:1.5;border-left:2px solid rgba(255,255,255,.07);padding-left:10px}
.movies-area{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;min-height:36px;padding:4px 0}
.movie-chip{position:relative;width:80px;flex-shrink:0;cursor:default;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.08);transition:border-color .15s,transform .15s}
.movie-chip:hover{border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
.chip-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a1a}
.chip-poster-placeholder{width:100%;aspect-ratio:2/3;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,.08)}
.chip-title{font-size:10px;font-weight:500;color:var(--text);font-family:'Noto Sans KR',sans-serif;padding:5px 5px 6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;height:calc(10px * 1.3 * 3 + 11px);background:var(--surface);flex-shrink:0}
.movie-chip .del-btn{display:none;position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid rgba(255,80,80,.5);cursor:pointer;color:#ff6b6b;font-size:10px;line-height:1;align-items:center;justify-content:center;transition:background .15s}
.movie-chip.admin-mode:hover .del-btn{display:flex}
.movie-chip .del-btn:hover{background:rgba(200,0,0,.6)}
.empty-hint{font-size:12px;color:rgba(255,255,255,.12);font-style:italic}

/* DB TAB */
.db-container{max-width:1100px;margin:0 auto;padding:0 48px 80px}
.db-stats{display:flex;gap:32px;margin-bottom:32px}
.stat-item{display:flex;flex-direction:column;gap:3px}
.stat-value{font-size:32px;font-weight:900;letter-spacing:-2px;color:#fff;line-height:1}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2.5px}
.db-toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.filter-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.7)}
.filter-btn.active{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:#fff}
.sort-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:6px 12px;outline:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
.movie-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s,transform .2s;position:relative;display:flex;flex-direction:column}
.movie-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px)}
.movie-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a1a}
.poster-placeholder{width:100%;aspect-ratio:2/3;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.08);font-size:36px}
.tier-badge-overlay{position:absolute;top:8px;left:8px;min-width:26px;height:26px;padding:0 6px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;font-family:'Inter',sans-serif;color:#000;letter-spacing:-.5px;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.movie-card-info{padding:10px 10px 12px;display:flex;flex-direction:column;flex:1}
.movie-card-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:4px;font-family:'Noto Sans KR',sans-serif;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:calc(12px * 1.35 * 2)}
.movie-card-date{font-size:11px;color:var(--muted);margin-bottom:8px}
.movie-card-note{font-size:11px;color:rgba(255,255,255,.28);line-height:1.4;font-style:italic;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tier-select{width:100%;background-color:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:rgba(255,255,255,.45);font-size:11px;padding:4px 8px;margin-top:auto;outline:none;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color .15s,color .15s;appearance:none;-webkit-appearance:none}
.tier-select option{background-color:#1e1e1e;color:#f0f0f0}
.tier-select:hover{border-color:rgba(255,255,255,.15)}
.tier-select:focus{border-color:rgba(255,255,255,.3);color:#fff}
.tier-select.has-tier{color:var(--text)}
.tier-select:disabled{opacity:.3;cursor:not-allowed}

/* REC TAB */
.rec-container{max-width:1100px;margin:0 auto;padding:0 48px 80px}
.rec-form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 32px;margin-bottom:40px}
.rec-form-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:20px;letter-spacing:-.3px}
.rec-form-body{display:grid;grid-template-columns:1fr 100px;gap:20px;align-items:start}
.rec-form-fields{display:flex;flex-direction:column;gap:12px}
.tmdb-search-wrap{position:relative}
.rec-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:10px 14px;outline:none;transition:border-color .15s}
.rec-input:focus{border-color:rgba(255,255,255,.3)}
.rec-input::placeholder{color:rgba(255,255,255,.25)}
.rec-textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:10px 14px;outline:none;resize:none;height:80px;line-height:1.5;transition:border-color .15s}
.rec-textarea:focus{border-color:rgba(255,255,255,.3)}
.rec-textarea::placeholder{color:rgba(255,255,255,.25)}
.tmdb-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1e1e1e;border:1px solid rgba(255,255,255,.12);border-radius:8px;overflow:hidden;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.tmdb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(255,255,255,.05)}
.tmdb-item:last-child{border-bottom:none}
.tmdb-item:hover{background:rgba(255,255,255,.06)}
.tmdb-item img{width:32px;height:48px;object-fit:cover;border-radius:3px;flex-shrink:0;background:#333}
.tmdb-item-noimg{width:32px;height:48px;background:#2a2a2a;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tmdb-item-info{display:flex;flex-direction:column;gap:2px}
.tmdb-item-title{font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif}
.tmdb-item-year{font-size:11px;color:var(--muted)}
.rec-poster-preview{width:100px;flex-shrink:0}
.rec-poster-preview img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:8px;display:block;border:1px solid rgba(255,255,255,.1)}
.rec-poster-empty{width:100%;aspect-ratio:2/3;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.1);font-size:28px}
.rec-submit-btn{padding:10px 24px;border-radius:8px;border:none;background:var(--s);color:#000;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:'Noto Sans KR',sans-serif}
.rec-submit-btn:hover{opacity:.85}
.rec-submit-btn:disabled{opacity:.4;cursor:not-allowed}
.rec-section-title{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .2s;position:relative}
.rec-card-del{display:none;position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid rgba(255,80,80,.5);cursor:pointer;color:#ff6b6b;font-size:11px;align-items:center;justify-content:center;transition:background .15s;z-index:1}
.rec-card.admin-mode:hover .rec-card-del{display:flex}
.rec-card-del:hover{background:rgba(200,0,0,.6)}
.rec-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px)}
.rec-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a1a}
.rec-card-noimg{width:100%;aspect-ratio:2/3;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.06);font-size:40px}
.rec-card-info{padding:12px 14px 14px;display:flex;flex-direction:column;flex:1;gap:5px}
.rec-card-title{font-size:13px;font-weight:700;color:var(--text);font-family:'Noto Sans KR',sans-serif;line-height:1.3}
.rec-card-nick{font-size:11px;color:var(--s);font-weight:600}
.rec-card-reason{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5;font-family:'Noto Sans KR',sans-serif;flex:1;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.rec-card-date{font-size:10px;color:rgba(255,255,255,.2);margin-top:4px}

/* ADMIN */
.admin-lock-btn{position:fixed;bottom:28px;right:28px;width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:rgba(255,255,255,.3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s,background .2s;z-index:200}
.admin-lock-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.6)}
.admin-lock-btn.unlocked{border-color:var(--s);color:var(--s);background:rgba(255,215,0,.08)}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-backdrop.open{display:flex}
.modal{background:#1a1a1a;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:32px;width:320px;display:flex;flex-direction:column;gap:16px}
.modal h3{font-size:16px;font-weight:700;color:#fff}
.modal-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:14px;padding:10px 14px;outline:none;transition:border-color .15s;font-family:'Inter',sans-serif}
.modal-input:focus{border-color:rgba(255,255,255,.3)}
.modal-error{font-size:12px;color:#FF6B6B;display:none}
.modal-error.show{display:block}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btn-confirm{padding:8px 20px;border-radius:8px;border:none;background:var(--s);color:#000;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.modal-btn-confirm:hover{opacity:.85}
.modal-btn-cancel{padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);font-size:13px;cursor:pointer}

.loading-msg{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:13px;grid-column:1/-1}
.footer{max-width:1100px;margin:0 auto;padding:0 48px 60px;display:flex;align-items:center;justify-content:space-between}
.footer-note{font-size:11px;color:rgba(255,255,255,.15)}
.save-status{font-size:11px;color:rgba(255,255,255,.2);transition:color .3s}
.save-status.ok{color:#5DDBA4}
.save-status.err{color:#FF6B6B}
</style>
</head>
<body>

<div class="header">
  <div class="header-year">2026</div>
  <div class="header-content">
    <div class="header-left">
      <h1>Film<span>.</span><br>Tier List</h1>
      <p>개인적 취향이 있는 주관적인 선정입니다</p>
    </div>
    <div class="header-meta">
      <span class="header-meta-label">Personal · 2026</span>
      <span class="header-meta-title">영화 등급표</span>
    </div>
  </div>
</div>

<div class="tabs-nav-wrap">
  <div class="tabs-nav">
    <button class="tab-btn active" data-tab="tier" onclick="switchTab('tier')">티어리스트</button>
    <button class="tab-btn" data-tab="db" onclick="switchTab('db')">영화 DB</button>
    <button class="tab-btn" data-tab="rec" onclick="switchTab('rec')">추천</button>
  </div>
</div>

<div id="tab-tier" class="tab-pane active">
  <div class="container" id="tierContainer">
    <div class="loading-msg">불러오는 중…</div>
  </div>
</div>

<div id="tab-db" class="tab-pane">
  <div class="db-container">
    <div class="db-stats">
      <div class="stat-item"><span class="stat-value" id="statTotal">—</span><span class="stat-label">Total</span></div>
      <div class="stat-item"><span class="stat-value" id="statYear">—</span><span class="stat-label">2026년</span></div>
      <div class="stat-item"><span class="stat-value" id="statRated">—</span><span class="stat-label">등급 있음</span></div>
    </div>
    <div class="db-toolbar">
      <div class="filter-group" id="filterGroup">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="s">S</button>
        <button class="filter-btn" data-filter="aplus">A⁺</button>
        <button class="filter-btn" data-filter="a">A</button>
        <button class="filter-btn" data-filter="b">B</button>
        <button class="filter-btn" data-filter="c">C</button>
        <button class="filter-btn" data-filter="d">D</button>
        <button class="filter-btn" data-filter="e">E</button>
        <button class="filter-btn" data-filter="none">미분류</button>
      </div>
      <select class="sort-select" id="sortSelect" onchange="renderDB()">
        <option value="date-desc">최신순</option>
        <option value="date-asc">오래된순</option>
        <option value="title">제목순</option>
      </select>
    </div>
    <div class="db-grid" id="dbGrid"><div class="loading-msg">불러오는 중…</div></div>
  </div>
</div>

<div id="tab-rec" class="tab-pane">
  <div class="rec-container">
    <div class="rec-form-card">
      <div class="rec-form-title">영화 추천하기</div>
      <div class="rec-form-body">
        <div class="rec-form-fields">
          <div class="tmdb-search-wrap">
            <input class="rec-input" id="recTitleInput" placeholder="영화 제목으로 검색…" autocomplete="off">
            <div class="tmdb-dropdown" id="tmdbDropdown"></div>
          </div>
          <input class="rec-input" id="recNickInput" placeholder="닉네임 (선택)">
          <textarea class="rec-textarea" id="recReasonInput" placeholder="추천 이유를 작성해 주세요…"></textarea>
          <div style="display:flex;justify-content:flex-end">
            <button class="rec-submit-btn" id="recSubmitBtn" onclick="submitRec()">추천 등록</button>
          </div>
        </div>
        <div class="rec-poster-preview" id="recPosterPreview">
          <div class="rec-poster-empty">🎬</div>
        </div>
      </div>
    </div>
    <div class="rec-section-title">추천 목록</div>
    <div class="rec-grid" id="recGrid"><div class="loading-msg">불러오는 중…</div></div>
  </div>
</div>

<button class="admin-lock-btn" id="adminLockBtn" onclick="toggleAdmin()" title="관리자">🔒</button>

<div class="modal-backdrop" id="adminModal">
  <div class="modal">
    <h3>관리자 로그인</h3>
    <input class="modal-input" type="password" id="adminPwInput" placeholder="비밀번호 입력">
    <div class="modal-error" id="adminError">비밀번호가 틀렸습니다</div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeAdminModal()">취소</button>
      <button class="modal-btn-confirm" onclick="submitAdmin()">확인</button>
    </div>
  </div>
</div>

<div class="footer">
  <span class="footer-note">영화 추천은 누구나 · 등급 설정은 관리자만</span>
  <span class="save-status" id="saveStatus">Supabase 연동됨</span>
</div>

const ADMIN_PW = 'Kes1219movie!!';

const TIERS = [
  { id:'s',     label:'S',  color:'#FFD700', desc:'볼 때마다 재미있는 영화' },
  { id:'aplus', label:'A⁺', color:'#FF8C42', desc:'또 보고 싶은 영화 · 추천할만한 영화' },
  { id:'a',     label:'A',  color:'#7EB8FF', desc:'작품성이 뛰어난 영화 · 내용이 궁금한 영화' },
  { id:'b',     label:'B',  color:'#5DDBA4', desc:'즐길 수 있는 영화 · 아쉽지 않은 영화' },
  { id:'c',     label:'C',  color:'#B8A0FF', desc:'킬링 타임용 영화 · 아쉬움이 묻어나오는 영화' },
  { id:'d',     label:'D',  color:'#FF6B6B', desc:'돈이 아까운 영화 · 화가 나는 영화' },
  { id:'e',     label:'E',  color:'#666680', desc:'중간에 나가고 싶은 영화' },
];

let allMovies = [], allRecs = [], activeFilter = 'all', selectedTMDB = null;
let isAdmin = sessionStorage.getItem('filmAdmin') === '1';

// ── 탭 ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['tier','db','rec'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t === tab));
}

// ── 상태 표시 ──
function showStatus(msg, type='ok') {
  const el = document.getElementById('saveStatus');
  el.textContent = msg; el.className = 'save-status '+type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.textContent = 'Supabase 연동됨'; el.className = 'save-status'; }, 2000);
}

// ── 어드민 ──
function updateAdminUI() {
  const btn = document.getElementById('adminLockBtn');
  btn.textContent = isAdmin ? '🔓' : '🔒';
  btn.classList.toggle('unlocked', isAdmin);
}

function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    sessionStorage.removeItem('filmAdmin');
    updateAdminUI();
    renderTierList();
    renderDB();
    renderRecs();
  } else {
    openAdminModal();
  }
}

function openAdminModal() {
  document.getElementById('adminModal').classList.add('open');
  document.getElementById('adminPwInput').value = '';
  document.getElementById('adminError').classList.remove('show');
  setTimeout(() => document.getElementById('adminPwInput').focus(), 50);
}
function closeAdminModal() { document.getElementById('adminModal').classList.remove('open'); }

function submitAdmin() {
  if (document.getElementById('adminPwInput').value === ADMIN_PW) {
    isAdmin = true;
    sessionStorage.setItem('filmAdmin', '1');
    closeAdminModal();
    updateAdminUI();
    renderTierList();
    renderDB();
    renderRecs();
  } else {
    document.getElementById('adminError').classList.add('show');
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminPwInput').focus();
  }
}

document.getElementById('adminPwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAdmin();
  if (e.key === 'Escape') closeAdminModal();
});
document.getElementById('adminModal').addEventListener('click', e => {
  if (e.target === document.getElementById('adminModal')) closeAdminModal();
});

// ── 데이터 로드 ──
async function loadMovies() {
  const { data, error } = await supa.from('movies').select('*').order('date', { ascending: false });
  if (error) { console.error(error); return []; }
  return data || [];
}
async function loadRecs() {
  const { data, error } = await supa.from('recommendations').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return []; }
  return data || [];
}

// ── 티어리스트 렌더 ──
function renderTierList() {
  const container = document.getElementById('tierContainer');
  container.innerHTML = '';

  TIERS.forEach(tier => {
    const list = allMovies.filter(m => m.tier === tier.id);
    const row = document.createElement('div');
    row.className = 'tier-row';
    row.style.setProperty('--tier-color', tier.color);

    const gradeCell = document.createElement('div');
    gradeCell.className = 'grade-cell';
    gradeCell.innerHTML = `<div class="grade-label">${tier.label}</div><div class="grade-dot"></div>`;

    const contentCell = document.createElement('div');
    contentCell.className = 'content-cell';

    const desc = document.createElement('div');
    desc.className = 'tier-desc';
    desc.textContent = tier.desc;

    const moviesArea = document.createElement('div');
    moviesArea.className = 'movies-area';

    if (list.length === 0) {
      const hint = document.createElement('span');
      hint.className = 'empty-hint';
      hint.textContent = '영화 없음';
      moviesArea.appendChild(hint);
    } else {
      list.forEach(movie => {
        const chip = document.createElement('div');
        chip.className = 'movie-chip' + (isAdmin ? ' admin-mode' : '');

        if (movie.poster_url) {
          const img = document.createElement('img');
          img.className = 'chip-poster';
          img.src = movie.poster_url;
          img.alt = movie.title;
          img.loading = 'lazy';
          img.onerror = function() {
            this.style.display = 'none';
            const ph = document.createElement('div');
            ph.className = 'chip-poster-placeholder';
            ph.textContent = '🎬';
            chip.insertBefore(ph, chip.firstChild);
          };
          chip.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'chip-poster-placeholder';
          ph.textContent = '🎬';
          chip.appendChild(ph);
        }

        const titleEl = document.createElement('div');
        titleEl.className = 'chip-title';
        titleEl.textContent = movie.title;
        chip.appendChild(titleEl);

        if (isAdmin) {
          const delBtn = document.createElement('button');
          delBtn.className = 'del-btn';
          delBtn.title = '티어에서 제거';
          delBtn.textContent = '✕';
          delBtn.addEventListener('click', () => removeTier(movie.id));
          chip.appendChild(delBtn);
        }

        moviesArea.appendChild(chip);
      });
    }

    contentCell.appendChild(desc);
    contentCell.appendChild(moviesArea);
    row.appendChild(gradeCell);
    row.appendChild(contentCell);
    container.appendChild(row);
  });
}

// ── DB 렌더 ──
function renderDB() {
  const grid = document.getElementById('dbGrid');
  const sortVal = document.getElementById('sortSelect').value;
  let filtered = [...allMovies];

  if (activeFilter === 'none') filtered = filtered.filter(m => !m.tier);
  else if (activeFilter !== 'all') filtered = filtered.filter(m => m.tier === activeFilter);

  if (sortVal === 'date-asc') filtered.sort((a,b) => new Date(a.date)-new Date(b.date));
  else if (sortVal === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title,'ko'));

  const yr = new Date().getFullYear().toString();
  document.getElementById('statTotal').textContent = allMovies.length;
  document.getElementById('statYear').textContent = allMovies.filter(m => m.date?.startsWith(yr)).length;
  document.getElementById('statRated').textContent = allMovies.filter(m => m.tier).length;

  grid.innerHTML = '';
  if (!filtered.length) {
    const msg = document.createElement('div');
    msg.className = 'loading-msg'; msg.textContent = '영화 없음';
    grid.appendChild(msg); return;
  }

  filtered.forEach(movie => {
    const tierInfo = TIERS.find(t => t.id === movie.tier);
    const card = document.createElement('div');
    card.className = 'movie-card';

    if (movie.poster_url) {
      const img = document.createElement('img');
      img.className = 'movie-card-poster'; img.src = movie.poster_url; img.alt = movie.title; img.loading = 'lazy';
      img.onerror = function() {
        this.style.display = 'none';
        const ph = document.createElement('div'); ph.className = 'poster-placeholder'; ph.textContent = '🎬';
        card.insertBefore(ph, card.firstChild);
      };
      card.appendChild(img);
    } else {
      const ph = document.createElement('div'); ph.className = 'poster-placeholder'; ph.textContent = '🎬';
      card.appendChild(ph);
    }

    if (tierInfo) {
      const badge = document.createElement('div');
      badge.className = 'tier-badge-overlay'; badge.style.background = tierInfo.color; badge.textContent = tierInfo.label;
      card.appendChild(badge);
    }

    const info = document.createElement('div'); info.className = 'movie-card-info';
    const title = document.createElement('div'); title.className = 'movie-card-title'; title.textContent = movie.title;
    const dateEl = document.createElement('div'); dateEl.className = 'movie-card-date';
    dateEl.textContent = movie.date ? new Date(movie.date+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'}) : '';
    info.appendChild(title); info.appendChild(dateEl);

    if (movie.note) {
      const note = document.createElement('div'); note.className = 'movie-card-note'; note.textContent = movie.note;
      info.appendChild(note);
    }

    const sel = document.createElement('select');
    sel.className = 'tier-select' + (movie.tier ? ' has-tier' : '');
    sel.disabled = !isAdmin;
    sel.innerHTML = `<option value="">미분류</option>`
      + TIERS.map(t => `<option value="${t.id}" ${movie.tier===t.id?'selected':''}>${t.label} — ${t.desc.split(' · ')[0]}</option>`).join('');
    sel.addEventListener('change', async () => {
      if (!isAdmin) return;
      const newTier = sel.value || null;
      await updateTier(movie.id, newTier);
      sel.className = 'tier-select' + (newTier ? ' has-tier' : '');
    });
    info.appendChild(sel);
    card.appendChild(info);
    grid.appendChild(card);
  });
}

// ── 추천 렌더 ──
function renderRecs() {
  const grid = document.getElementById('recGrid');
  grid.innerHTML = '';

  if (!allRecs.length) {
    const msg = document.createElement('div'); msg.className = 'loading-msg'; msg.textContent = '아직 추천이 없습니다';
    grid.appendChild(msg); return;
  }

  allRecs.forEach(rec => {
    const card = document.createElement('div'); card.className = 'rec-card' + (isAdmin ? ' admin-mode' : '');

    if (isAdmin) {
      const delBtn = document.createElement('button'); delBtn.className = 'rec-card-del'; delBtn.textContent = '✕'; delBtn.title = '삭제';
      delBtn.addEventListener('click', () => deleteRec(rec.id));
      card.appendChild(delBtn);
    }

    if (rec.poster_url) {
      const img = document.createElement('img');
      img.className = 'rec-card-poster'; img.src = rec.poster_url; img.alt = rec.title; img.loading = 'lazy';
      img.onerror = function() {
        this.style.display = 'none';
        const ph = document.createElement('div'); ph.className = 'rec-card-noimg'; ph.textContent = '🎬';
        card.insertBefore(ph, card.firstChild);
      };
      card.appendChild(img);
    } else {
      const ph = document.createElement('div'); ph.className = 'rec-card-noimg'; ph.textContent = '🎬';
      card.appendChild(ph);
    }

    const info = document.createElement('div'); info.className = 'rec-card-info';
    const titleEl = document.createElement('div'); titleEl.className = 'rec-card-title'; titleEl.textContent = rec.title;
    const nickEl = document.createElement('div'); nickEl.className = 'rec-card-nick'; nickEl.textContent = rec.nickname ? `by ${rec.nickname}` : 'by 익명';
    info.appendChild(titleEl); info.appendChild(nickEl);

    if (rec.reason) {
      const reasonEl = document.createElement('div'); reasonEl.className = 'rec-card-reason'; reasonEl.textContent = rec.reason;
      info.appendChild(reasonEl);
    }

    const dateEl = document.createElement('div'); dateEl.className = 'rec-card-date';
    dateEl.textContent = new Date(rec.created_at).toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});
    info.appendChild(dateEl);
    card.appendChild(info);
    grid.appendChild(card);
  });
}

// ── TMDB 검색 ──
let tmdbTimer = null;
document.getElementById('recTitleInput').addEventListener('input', e => {
  const q = e.target.value.trim();
  selectedTMDB = null;
  clearTimeout(tmdbTimer);
  if (!q) { closeTMDBDropdown(); return; }
  tmdbTimer = setTimeout(() => fetchTMDB(q), 350);
});

document.addEventListener('click', e => {
  if (!document.getElementById('recTitleInput').contains(e.target) &&
      !document.getElementById('tmdbDropdown').contains(e.target)) closeTMDBDropdown();
});

async function fetchTMDB(query) {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=ko-KR&page=1`);
    const data = await res.json();
    showTMDBDropdown(data.results?.slice(0,7) || []);
  } catch { closeTMDBDropdown(); }
}

function showTMDBDropdown(results) {
  const dropdown = document.getElementById('tmdbDropdown');
  dropdown.innerHTML = '';
  if (!results.length) { dropdown.style.display = 'none'; return; }

  results.forEach(movie => {
    const item = document.createElement('div'); item.className = 'tmdb-item';
    const year = movie.release_date ? movie.release_date.split('-')[0] : '';

    if (movie.poster_path) {
      const img = document.createElement('img');
      img.src = `https://image.tmdb.org/t/p/w92${movie.poster_path}`; img.alt = '';
      item.appendChild(img);
    } else {
      const noimg = document.createElement('div'); noimg.className = 'tmdb-item-noimg'; noimg.textContent = '🎬';
      item.appendChild(noimg);
    }

    const infoDiv = document.createElement('div'); infoDiv.className = 'tmdb-item-info';
    const t = document.createElement('div'); t.className = 'tmdb-item-title'; t.textContent = movie.title;
    const y = document.createElement('div'); y.className = 'tmdb-item-year'; y.textContent = year;
    infoDiv.appendChild(t); infoDiv.appendChild(y);
    item.appendChild(infoDiv);
    item.addEventListener('click', () => selectTMDB(movie));
    dropdown.appendChild(item);
  });
  dropdown.style.display = 'block';
}

function closeTMDBDropdown() { document.getElementById('tmdbDropdown').style.display = 'none'; }

function selectTMDB(movie) {
  selectedTMDB = movie;
  document.getElementById('recTitleInput').value = movie.title;
  closeTMDBDropdown();
  const preview = document.getElementById('recPosterPreview');
  if (movie.poster_path) {
    preview.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${movie.poster_path}" alt="${movie.title}">`;
  } else {
    preview.innerHTML = '<div class="rec-poster-empty">🎬</div>';
  }
}

// ── 추천 제출 ──
async function submitRec() {
  const titleInput = document.getElementById('recTitleInput');
  const title = titleInput.value.trim();
  if (!title) { titleInput.focus(); return; }

  const submitBtn = document.getElementById('recSubmitBtn');
  submitBtn.disabled = true; submitBtn.textContent = '…';

  const { data, error } = await supa.from('recommendations').insert({
    title,
    nickname: document.getElementById('recNickInput').value.trim() || null,
    reason: document.getElementById('recReasonInput').value.trim() || null,
    poster_url: selectedTMDB?.poster_path ? `https://image.tmdb.org/t/p/w342${selectedTMDB.poster_path}` : null,
    tmdb_id: selectedTMDB?.id || null,
  }).select().single();

  submitBtn.disabled = false; submitBtn.textContent = '추천 등록';

  if (!error && data) {
    allRecs.unshift(data);
    renderRecs();
    titleInput.value = '';
    document.getElementById('recNickInput').value = '';
    document.getElementById('recReasonInput').value = '';
    selectedTMDB = null;
    document.getElementById('recPosterPreview').innerHTML = '<div class="rec-poster-empty">🎬</div>';
    showStatus('추천 등록됨 ✓');
  } else {
    showStatus('오류 발생', 'err');
    console.error(error);
  }
}

// ── 필터 ──
document.getElementById('filterGroup').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderDB();
});

// ── CRUD ──
async function deleteRec(id) {
  if (!isAdmin) return;
  const { error } = await supa.from('recommendations').delete().eq('id', id);
  if (!error) {
    allRecs = allRecs.filter(r => r.id !== id);
    showStatus('삭제됨 ✓'); renderRecs();
  } else showStatus('오류 발생', 'err');
}

async function removeTier(id) {
  if (!isAdmin) return;
  const { error } = await supa.from('movies').update({ tier: null }).eq('id', id);
  if (!error) {
    const m = allMovies.find(m => m.id === id); if (m) m.tier = null;
    showStatus('제거됨 ✓'); renderTierList(); renderDB();
  } else showStatus('오류 발생', 'err');
}

async function updateTier(id, tier) {
  if (!isAdmin) return;
  const { error } = await supa.from('movies').update({ tier }).eq('id', id);
  if (!error) {
    const m = allMovies.find(m => m.id === id); if (m) m.tier = tier;
    showStatus('저장됨 ✓'); renderTierList();
  } else showStatus('오류 발생', 'err');
}

// ── 초기화 ──
async function init() {
  updateAdminUI();
  [allMovies, allRecs] = await Promise.all([loadMovies(), loadRecs()]);
  renderTierList(); renderDB(); renderRecs();
}

init();
</script>
